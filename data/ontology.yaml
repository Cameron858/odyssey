nodes:
  - type: person
    description: A named human or divine character explicitly mentioned in the text. Do not use generic roles, pronouns, or descriptions.

  - type: god
    description: A named deity or immortal figure explicitly mentioned in the text.

  - type: place
    description: A named location, city, island, region, or realm.

  - type: group
    description: A named collective or people-group, such as a crew, household, nation, or band.

  - type: artifact
    description: A named object, item, weapon, ship, or treasure.

  - type: creature
    description: A named animal, monster, beast, or mythological creature.

  - type: event
    description: A named event, battle, journey, or other significant occurrence.

relationships:
  - type: spouse
    description: An explicitly stated marriage or lifelong partnership relationship between source and target.
    source:
      - person
      - god
    target:
      - person
      - god

  - type: parent
    description: An explicitly stated parental relationship where source is parent of target.
    source:
      - person
      - god
    target:
      - person
      - god

  - type: child
    description: An explicitly stated parental relationship where source is child of target.
    source:
      - person
      - god
    target:
      - person
      - god

  - type: sibling
    description: An explicitly stated sibling relationship between source and target.
    source:
      - person
      - god
    target:
      - person
      - god

  - type: ally
    description: A cooperative or friendly relationship explicitly stated between source and target.
    source:
      - person
      - god
      - group
    target:
      - person
      - god
      - group

  - type: enemy
    description: A hostile or opposing relationship explicitly stated between source and target.
    source:
      - person
      - god
      - group
    target:
      - person
      - god
      - group

  - type: visited
    description: Source explicitly travelled to, encountered, or arrived at target.
    source:
      - person
      - god
      - group
    target:
      - place
      - person
      - god
      - creature

  - type: located_in
    description: Source is explicitly located in or belongs to the target place.
    source:
      - person
      - god
      - group
      - artifact
      - creature
    target:
      - place

  - type: owns
    description: Source explicitly possesses or has control over the target artifact, group, or place.
    source:
      - person
      - god
      - group
    target:
      - artifact
      - group
      - place

  - type: part_of
    description: Source is explicitly part of or belongs to the target group or place.
    source:
      - person
      - god
      - artifact
      - creature
      - group
    target:
      - group
      - place

  - type: participated_in
    description: Source explicitly took part in or was involved in the target event.
    source:
      - person
      - god
      - group
    target:
      - event

  - type: detained
    description: Source explicitly held or confined target against their will.
    source:
      - person
      - god
      - group
    target:
      - person
      - god
      - group

  - type: persecuted
    description: Source explicitly harassed, oppressed, or pursued target over time.
    source:
      - person
      - god
      - group
    target:
      - person
      - god
      - group
      - creature

  - type: fought
    description: Source explicitly fought, battled, or clashed with target.
    source:
      - person
      - god
      - group
      - creature
    target:
      - person
      - god
      - group
      - creature

  - type: helped
    description: Source explicitly assisted or aided target.
    source:
      - person
      - god
      - group
    target:
      - person
      - god
      - group

  - type: worships
    description: Source explicitly worships, honors, or prays to the target god.
    source:
      - person
      - group
    target:
      - god
